name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

jobs:
  validate-config:
    name: Validate config.example.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          YQ_VERSION=$(grep 'ARG YQ_VERSION=' Dockerfile | sed 's/.*=//')
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Lint config.example.yml
        run: |
          echo "Checking YAML syntax..."
          yq '.' config.example.yml > /dev/null
          echo "Checking install keys are non-empty..."
          count=$(yq '.install | length' config.example.yml)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: no install entries found" >&2
            exit 1
          fi
          echo "Install entries: $count"
          for i in $(seq 0 $((count - 1))); do
            key=$(yq ".install | keys[$i]" config.example.yml)
            cmd=$(yq ".install.$key" config.example.yml)
            if [ -z "$cmd" ] || [ "$cmd" = "null" ]; then
              echo "ERROR: empty command for $key" >&2
              exit 1
            fi
            echo "  $key: OK"
          done

  validate-installer:
    name: Validate installer.sh (dry-run)
    runs-on: ubuntu-latest
    needs: validate-config
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          YQ_VERSION=$(grep 'ARG YQ_VERSION=' Dockerfile | sed 's/.*=//')
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Syntax check installer.sh
        run: bash -n scripts/installer.sh

      - name: Dry-run installer against config.example.yml
        run: |
          # Replace all install commands with 'true' so we validate parsing
          # and control flow without actually installing anything.
          yq '.install | with_entries(.value = "true")' config.example.yml > /tmp/config.yml
          bash -x scripts/installer.sh

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: validate-installer
    steps:
      - uses: actions/checkout@v4

      - name: Build sandbox image
        run: docker compose build --progress=plain
