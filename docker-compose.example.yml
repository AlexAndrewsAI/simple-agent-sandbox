services:
  sandbox:
    build:
      context: .
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    environment:
      - HOME=/persist
      - PATH=/persist/.local/bin:/root/.local/bin:/usr/local/bin:$PATH
    volumes:
      - ./persist:/persist
    tty: true
    stdin_open: true
