services:
  sandbox:
    build:
      context: .
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    environment:
      - HOME=/persist
      - PATH=/home/sandbox/.local/bin:/persist/.local/bin:/usr/local/bin:/usr/bin:/bin:/home/sandbox/node_modules/cline/bin
    
    
    volumes:
      # ┌─────────────────────────────────────────────────────────┐
      # │  ADD YOUR MOUNTS HERE                                   │
      # │  Adjust to include other folders in the                 │
      # │  sandbox, e.g.:                                         │
      # │    - ./workspace:/workspace                             │
      # │    - ~/data:/data                                       │
      # └─────────────────────────────────────────────────────────┘
      - ./persist:/persist
    tty: true
    stdin_open: true
