services:
  sandbox:
    build:
      context: .
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    environment:
      - HOME=/persist
      - PATH=/home/sandbox/.local/bin:/persist/.local/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/home/sandbox/.npm-global/lib/node_modules/cline/bin
    # Add other folders you wish included in the sandbox
    volumes:
      - ./persist:/persist
    tty: true
    stdin_open: true
